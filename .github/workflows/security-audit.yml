# Weekly security audit — full repo scan + branch protection verification.
name: Weekly Security Audit

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  full-scan:
    name: Full Repository Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.30.1_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/
      - name: Full gitleaks scan
        run: gitleaks detect --config .gitleaks.toml --no-git -v
      - name: Full blocklist scan
        run: |
          if [ ! -f .security-blocklist.txt ]; then exit 0; fi
          FAILED=0
          while IFS= read -r term || [ -n "$term" ]; do
            [[ "$term" =~ ^#.*$ || -z "$term" ]] && continue
            term=$(echo "$term" | xargs)
            [ -z "$term" ] && continue
            FINDINGS=$(grep -rn --include='*.py' --include='*.go' --include='*.js' \
              --include='*.ts' --include='*.md' --include='*.toml' --include='*.json' \
              --include='*.yaml' --include='*.yml' --include='*.sh' \
              --exclude-dir='.git' --exclude-dir='node_modules' --exclude-dir='.venv' \
              --exclude='.security-blocklist.txt' --exclude='.gitleaks.toml' \
              "$term" . 2>/dev/null || true)
            if [ -n "$FINDINGS" ]; then
              echo "::error::Blocklisted term '$term' found:"
              echo "$FINDINGS"
              FAILED=1
            fi
          done < .security-blocklist.txt
          if [ "$FAILED" -eq 1 ]; then exit 1; fi

  verify-protection:
    name: Verify Branch Protection
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check branch protection
        run: |
          HTTP_CODE=$(curl -s -o /tmp/protection.json -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/branches/main/protection")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Branch protection NOT enabled (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Branch protection is active."
